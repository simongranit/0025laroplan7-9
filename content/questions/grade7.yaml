  - id: g7_bråk_002
    grade: 7
    topic: Taluppfattning
    difficulty: hard
    stem: 3/5 av ett tal är 27. Vilket är talet?
    answer: "45"
    solution_explainer: "Dividera 27 med 3 och multiplicera med 5: 27/3 = 9, 9·5 = 45."
    tags: [bråk]
  - id: g7_proc_002
    grade: 7
    topic: Procent
    difficulty: medium
    stem: En tröja kostar 400 kr. Priset sänks med 15 %. Vad blir det nya priset?
    answer: "340"
    solution_explainer: "15 % av 400 är 60, 400 − 60 = 340 kr."
    tags: [procent]
