  - id: g7_geo_002
    grade: 7
    topic: Geometri
    difficulty: hard
    stem: Omkretsen av en rektangel är 48 cm och längden är 14 cm. Vad är bredden?
    answer: "10"
    solution_explainer: "2(l + b) = 48 → l + b = 24 → 14 + b = 24 → b = 10."
