  - id: g7_geo_001
    grade: 7
    topic: Geometri
    difficulty: medium
    stem: En triangel har vinklarna 35°, 75° och x°. Vad är x?
    answer: "70"
    solution_explainer: "Summan av vinklarna i en triangel är 180°, så 35 + 75 + x = 180 → x = 70."
    tags: [triangel, vinklar]
